apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient
  namespace: medistream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient
  template:
    metadata:
      labels:
        app: patient
    spec:
      containers:
        - name: patient
          image: medistream-patient:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: medistream-config
            - secretRef:
                name: medistream-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: medistream
spec:
  selector:
    app: patient
  ports:
    - name: http
      port: 8082
      targetPort: 8082
  type: ClusterIP
