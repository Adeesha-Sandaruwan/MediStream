services:
  postgres:
    image: postgres:16-alpine
    container_name: medistream-db
    environment:
      POSTGRES_USER: medistream_user
      POSTGRES_PASSWORD: medistream_password
      POSTGRES_DB: medistream_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: