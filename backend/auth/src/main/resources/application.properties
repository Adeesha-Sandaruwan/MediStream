spring.config.import=optional:file:.env[.properties]
spring.application.name=auth
server.port=8081

# Connect to Supabase using Environment Variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase PgBouncer transaction pooling does not support server-side prepared statements.
spring.datasource.hikari.data-source-properties.preferQueryMode=simple
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# The Microservice Wall (Isolating the Auth data)
spring.jpa.properties.hibernate.default_schema=auth_schema

# JWT Secrets
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

#Google OAuth2 Client ID
google.client.id=${GOOGLE_CLIENT_ID}


# Strictly limit and forcefully drop idle connections
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000