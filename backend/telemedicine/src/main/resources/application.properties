spring.config.import=optional:file:.env[.properties]
spring.application.name=telemedicine
server.port=8083

# Connect to Supabase using Environment Variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Telemedicine schema
spring.jpa.properties.hibernate.default_schema=telemedicine_schema

# JWT Secret (API auth)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Telemedicine cleanup
telemedicine.cleanup.createdTimeoutMinutes=60
telemedicine.cleanup.endedRetentionDays=30
telemedicine.cleanup.fixedDelayMs=5000

# Video provider (Jitsi Meet with JWT)
telemedicine.video.provider=JITSI
telemedicine.video.jitsi.domain=${JITSI_DOMAIN:meet.jit.si}
telemedicine.video.jitsi.issuer=${JITSI_ISSUER:medistream}
telemedicine.video.jitsi.audience=${JITSI_AUDIENCE:jitsi}
telemedicine.video.jitsi.subject=${JITSI_SUBJECT:meet.jit.si}
telemedicine.video.jitsi.jwtSecret=${JITSI_JWT_SECRET:}
telemedicine.video.jitsi.tokenTtlSeconds=${JITSI_TOKEN_TTL_SECONDS:3600}

