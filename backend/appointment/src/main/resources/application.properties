# ==================== Application Configuration ====================
spring.application.name=appointment-service



# ==================== Server Configuration ====================
server.port=8086
server.servlet.context-path=/api/v1

# ==================== Database Configuration (Supabase PostgreSQL) ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.nepfweteejxjuvwqgpek}
spring.datasource.password=${DB_PASSWORD:MediStream@Sliit123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==================== JPA / Hibernate ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.default_schema=appointment

# ==================== Connection Pool (Hikari) ====================
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ==================== Mail Configuration ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=abishekjayasinghe944@gmail.com
spring.mail.password=mfhmyzjzoaglohky
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@healthcare-system.com

# ==================== Feign Client Configuration ====================
feign.patient-service.url=http://localhost:8082
feign.doctor-service.url=http://localhost:8084
feign.compression.request.enabled=true
feign.compression.response.enabled=true

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.com.healthcare.appointment=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/appointment-service.log

# ==================== Swagger / OpenAPI Configuration ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ==================== Actuator Configuration ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/api/v1/actuator

# ==================== Jackson Configuration ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# ==================== Async Configuration ====================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100

# ==================== Eureka Configuration (Disabled) ====================
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false