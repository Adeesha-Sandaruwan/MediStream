# ========================================
# Application Configuration
# ========================================
spring.application.name=notification-service
server.port=8085

# ========================================
# Supabase PostgreSQL Configuration
# ========================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.nepfweteejxjuvwqgpek
spring.datasource.password=MediStream@Sliit123
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool – Safe for Supabase Free Tier
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.defer-datasource-initialization=true

# Database Initialization
spring.sql.init.mode=always
spring.sql.init.platform=postgresql

# ========================================
# H2 Database (Optional / In-Memory)
# ========================================
spring.datasource.h2.url=jdbc:h2:mem:notificationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.username=sa
spring.datasource.h2.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# Email Configuration (Gmail SMTP)
