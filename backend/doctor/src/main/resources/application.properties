spring.config.import=optional:file:.env[.properties]

spring.application.name=doctor
server.port=8084

# Connect to Postgres via environment variables (same pattern as patient / telemedicine)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Isolate doctor persistence in its own schema
spring.jpa.properties.hibernate.default_schema=doctor_schema

# JWT secret ? must match Auth service for token verification (Step 2)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=3

# Internal orchestration targets
services.appointment.url=${APPOINTMENT_SERVICE_URL:http://localhost:8086/api/v1}
services.telemedicine.url=${TELEMEDICINE_SERVICE_URL:http://localhost:8083}

# Expose concise error messages to frontend for faster debugging.
server.error.include-message=always

